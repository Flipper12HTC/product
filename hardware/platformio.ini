; ESP32 firmware for the cabinet's physical flipper buttons.
; The CI (.github/workflows/firmware.yml) runs `pio run` here, merges the output
; with esptool, and commits hardware/firmware/build/firmware.bin — which
; Fliphetic flashes at Load (see the [esp32.esp32] block in fliphetic.toml).
; The cabinet never compiles firmware itself.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 921600
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
build_flags =
    -std=gnu++17
    ; Non-secret values, hard-coded (this repo is public).
    -DWIFI_SSID='"FLIPHETIC_CAB0"'
    -DMQTT_BROKER_PORT=1883
    -DDEVICE_ID='"flipper-cabinet"'
    ; No broker IP hard-coded: the firmware targets the Wi-Fi gateway, i.e. the
    ; cabinet itself (it hosts the FLIPHETIC_CAB0 AP), see connectMqtt(). A
    ; Tailscale IP (100.x) would never work — the ESP32 is not on the tailnet.
    ; Force a specific host with -DMQTT_BROKER_HOST='"x.x.x.x"' if ever needed.
    ; WIFI_PASSWORD is injected by CI via PLATFORMIO_BUILD_FLAGS from the
    ; WIFI_PASSWORD repo secret (never in source). Empty fallback for a bare
    ; local build (see include/Config.h) → compiles, but Wi-Fi won't connect.
