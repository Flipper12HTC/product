[platformio]
default_envs = esp32dev

[env]
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
build_unflags =
    -std=gnu++11

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -Wall
lib_deps =
    bblanchon/ArduinoJson@^7.0.0