name: Build ESP32 firmware

# Builds the flipper-button firmware and commits the merged binary back to the
# repo. The cabinet flashes that committed binary on load — it never builds
# firmware itself. See https://pandormedia.github.io/fliphetic/esp32-firmware/

on:
  push:
    branches: [main]
    paths:
      - "hardware/**"
      - "!hardware/firmware/build/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO and esptool
        run: pip install platformio esptool

      - name: Build
        # The Wi-Fi password comes from the WIFI_PASSWORD repo secret, injected
        # as a build flag so it never lands in source (this repo is public). The
        # SSID is not secret and is hard-coded in platformio.ini. The password is
        # still embedded in the committed binary — keep the FLIPHETIC_CAB0
        # passphrase dedicated, never reuse an SSH/account password for it.
        env:
          PLATFORMIO_BUILD_FLAGS: -DWIFI_PASSWORD='"${{ secrets.WIFI_PASSWORD }}"'
        run: pio run --project-dir hardware -e esp32dev

      - name: Merge into a single image
        run: |
          BUILD=hardware/.pio/build/esp32dev
          mkdir -p hardware/firmware/build
          esptool --chip esp32 merge_bin -o hardware/firmware/build/firmware.bin \
            0x1000  "$BUILD/bootloader.bin" \
            0x8000  "$BUILD/partitions.bin" \
            0x10000 "$BUILD/firmware.bin"

      - name: Commit the binary
        # The path filter above already excludes firmware/build/**, so pushing
        # the binary does not retrigger this workflow (no [skip ci] needed).
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hardware/firmware/build/firmware.bin
          git diff --staged --quiet && echo "no change" && exit 0
          git commit -m "chore: update ESP32 firmware binary"
          git push
