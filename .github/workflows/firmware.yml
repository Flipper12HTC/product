name: Build ESP32 firmware

# Builds the flipper-button firmware and commits the merged binary back to the
# repo. The cabinet flashes that committed binary on load — it never builds
# firmware itself. See https://pandormedia.github.io/fliphetic/esp32-firmware/

on:
  push:
    branches: [main]
    paths:
      - "hardware/**"
      - "!hardware/firmware/build/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO and esptool
        run: pip install platformio esptool

      - name: Write secrets.h
        # WiFi credentials are injected from repo secrets so they never land in
        # source. They are still embedded in the committed binary, so keep the
        # FLIPHETIC_CAB0 passphrase dedicated — never reuse an SSH/account one.
        run: |
          cat > hardware/src/secrets.h <<EOF
          #pragma once
          static const char* WIFI_SSID     = "${{ secrets.WIFI_SSID }}";
          static const char* WIFI_PASSWORD = "${{ secrets.WIFI_PASSWORD }}";
          EOF

      - name: Build
        run: pio run --project-dir hardware -e esp32dev

      - name: Merge into a single image
        run: |
          BUILD=hardware/.pio/build/esp32dev
          mkdir -p hardware/firmware/build
          esptool --chip esp32 merge_bin -o hardware/firmware/build/firmware.bin \
            0x1000  "$BUILD/bootloader.bin" \
            0x8000  "$BUILD/partitions.bin" \
            0x10000 "$BUILD/firmware.bin"

      - name: Commit the binary
        run: |
          git config user.name  "firmware-ci"
          git config user.email "firmware-ci@users.noreply.github.com"
          git add hardware/firmware/build/firmware.bin
          git diff --staged --quiet && echo "no change" && exit 0
          git commit -m "ci: rebuild ESP32 firmware [skip ci]"
          git push
