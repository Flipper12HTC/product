# Serves one built screen app and reverse-proxies the backend API + WebSocket.
# The same config is baked into all three screen images (front / back / deco);
# only the static files under /usr/share/nginx/html differ.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS, resolved lazily so nginx still starts (and the
    # screen still renders) when the backend container isn't up yet.
    resolver 127.0.0.11 valid=10s;

    # Live game stream: WebSocket, backend gateway at /ws.
    location /ws {
        set $backend backend;
        proxy_pass http://$backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 1h;
    }

    # Game control + state (start, flipper, plunger, state, ...).
    location /game/ {
        set $backend backend;
        proxy_pass http://$backend:8080;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
    }

    # Leaderboard.
    location /scores/ {
        set $backend backend;
        proxy_pass http://$backend:8080;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
    }

    # Backend health (handy for debugging from a screen URL).
    location = /health {
        set $backend backend;
        proxy_pass http://$backend:8080/health;
        proxy_connect_timeout 2s;
    }

    # SPA fallback for the static bundle.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
